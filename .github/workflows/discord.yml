name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          # Get details from the latest commit
          AUTHOR="${{ github.event.head_commit.committer.name }}"
          COMMITTER="${{ github.event.head_commit.committer.name }}"
          MESSAGE="${{ github.event.head_commit.message }}"
          DESCRIPTION="${{ github.event.head_commit.body }}"
          BRANCH="${{ github.ref_name }}"
          URL="${{ github.event.head_commit.url }}"

          # Determine display author (committer if different from author)
          if [ "${{ github.event.head_commit.author.name }}" != "$COMMITTER" ]; then
            DISPLAY_AUTHOR="$COMMITTER"
          else
            DISPLAY_AUTHOR="${{ github.event.head_commit.author.name }}"
          fi

          # Build file changes
          FILES=""
          for f in ${{ toJson(github.event.head_commit.added) }}; do
            FILES+="🖊 Created: $f"$'\n'
          done
          for f in ${{ toJson(github.event.head_commit.modified) }}; do
            FILES+="🔧 Updated: $f"$'\n'
          done
          for f in ${{ toJson(github.event.head_commit.removed) }}; do
            FILES+="❌ Removed: $f"$'\n'
          done

          # Build the final message
          MSG="$FILES"
          MSG+="Author: $DISPLAY_AUTHOR"$'\n'
          MSG+="Commit Message: $MESSAGE"$'\n'
          if [ "$DESCRIPTION" != "null" ] && [ "$DESCRIPTION" != "" ]; then
            MSG+="Extended Description: \"$DESCRIPTION\""$'\n'
          fi
          MSG+="Branch: $BRANCH"$'\n'
          MSG+="🔗 $URL"

          # Send to Discord
          PAYLOAD=$(jq -n --arg content "$MSG" '{content: $content}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK }}
