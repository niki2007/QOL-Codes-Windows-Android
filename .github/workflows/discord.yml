name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          # Commit details
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_TITLE="${{ github.event.head_commit.message }}"
          COMMIT_BODY="${{ github.event.head_commit.body }}"
          BRANCH="${{ github.ref_name }}"
          URL="${{ github.event.head_commit.url }}"

          # Build Discord message
          MSG="$COMMIT_TITLE"$'\n'
          MSG+="Author: $AUTHOR"$'\n'
          if [ "$COMMIT_BODY" != "null" ] && [ "$COMMIT_BODY" != "" ]; then
            MSG+="Extended Description: \"$COMMIT_BODY\""$'\n'
          fi
          MSG+="Branch: $BRANCH"$'\n'
          MSG+="🔗 $URL"

          # Send message
          PAYLOAD=$(jq -n --arg content "$MSG" '{content: $content}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK }}
