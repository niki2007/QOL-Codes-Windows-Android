name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          MSG=$(jq -Rn --arg m "${{ github.event.head_commit.message }}" \
            '{content: "🚀 **New commit pushed!**\n👤 Author: $ENV_GITHUB_ACTOR\n📝 Message: \($m)\n🌿 Branch: $ENV_GITHUB_REF_NAME\n🔗 https://github.com/$ENV_GITHUB_REPOSITORY/commit/$ENV_GITHUB_SHA"}')
          curl -H "Content-Type: application/json" -d "$MSG" ${{ secrets.DISCORD_WEBHOOK }}
        env:
          ENV_GITHUB_ACTOR: ${{ github.actor }}
          ENV_GITHUB_REF_NAME: ${{ github.ref_name }}
          ENV_GITHUB_REPOSITORY: ${{ github.repository }}
          ENV_GITHUB_SHA: ${{ github.sha }}
