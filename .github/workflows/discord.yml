name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          MSG=""

          # Loop over all commits safely
          for row in $(jq -c '.commits[]' <<< "${{ toJson(github.event.commits) }}"); do
            AUTHOR=$(jq -r '.author.name' <<< "$row")
            COMMITTER=$(jq -r '.committer.name' <<< "$row")
            MESSAGE=$(jq -r '.message' <<< "$row")
            DESCRIPTION=$(jq -r '.body' <<< "$row")
            URL=$(jq -r '.url' <<< "$row")

            FILES=$(jq -r '.added[]? | "🖊 Created: \(. )"' <<< "$row")
            FILES+=$'\n'
            FILES+=$(jq -r '.modified[]? | "🔧 Updated: \(. )"' <<< "$row")
            FILES+=$'\n'
            FILES+=$(jq -r '.removed[]? | "❌ Removed: \(. )"' <<< "$row")

            if [ "$AUTHOR" != "$COMMITTER" ]; then
              DISPLAY_AUTHOR="$COMMITTER"
            else
              DISPLAY_AUTHOR="$AUTHOR"
            fi

            MSG+=$'\n'"$FILES"$'\n'
            MSG+="Author: $DISPLAY_AUTHOR"$'\n'
            MSG+="Commit Message: $MESSAGE"$'\n'
            if [ "$DESCRIPTION" != "null" ] && [ "$DESCRIPTION" != "" ]; then
              MSG+="Extended Description:\n\"$DESCRIPTION\""$'\n'
            fi
            MSG+="Branch: $GITHUB_REF_NAME"$'\n'
            MSG+="🔗 $URL"$'\n\n'
          done

          # Send to Discord
          curl -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$MSG" '{content: $content}')" \
            ${{ secrets.DISCORD_WEBHOOK }}

        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
