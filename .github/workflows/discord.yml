name: Discord Test

on:
  push:  # triggers on any push

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Send test message
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ Test message from GitHub Actions!\"}" \
          $DISCORD_WEBHOOK
