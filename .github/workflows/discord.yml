name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          echo "${{ toJson(github.event.commits) }}" | jq -c '.[]' | while read -r C; do
            AUTHOR=$(jq -r '.author.name' <<< "$C")
            COMMITTER=$(jq -r '.committer.name' <<< "$C")
            MESSAGE=$(jq -r '.message' <<< "$C")
            DESCRIPTION=$(jq -r '.body' <<< "$C")
            URL=$(jq -r '.url' <<< "$C")

            FILES=$(jq -r '.added[]? | "🖊 Created: \(. )"' <<< "$C")
            FILES+=$'\n'
            FILES+=$(jq -r '.modified[]? | "🔧 Updated: \(. )"' <<< "$C")
            FILES+=$'\n'
            FILES+=$(jq -r '.removed[]? | "❌ Removed: \(. )"' <<< "$C")

            if [ "$AUTHOR" != "$COMMITTER" ]; then
              DISPLAY_AUTHOR="$COMMITTER"
            else
              DISPLAY_AUTHOR="$AUTHOR"
            fi

            COMMIT_MSG="\n$FILES\nAuthor: $DISPLAY_AUTHOR\nCommit Message: $MESSAGE"
            if [ "$DESCRIPTION" != "null" ] && [ "$DESCRIPTION" != "" ]; then
              COMMIT_MSG+="\nExtended Description:\n\"$DESCRIPTION\""
            fi
            COMMIT_MSG+="\nBranch: $GITHUB_REF_NAME\n🔗 $URL\n"

            echo "$COMMIT_MSG"
          done | jq -R -s --arg webhook "${{ secrets.DISCORD_WEBHOOK }}" \
              '{content: .}' | curl -H "Content-Type: application/json" -d @- ${{ secrets.DISCORD_WEBHOOK }}

        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
