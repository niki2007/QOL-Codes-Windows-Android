name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMITTER="${{ github.event.head_commit.committer.name }}"
          MESSAGE="${{ github.event.head_commit.message }}"
          DESCRIPTION="${{ github.event.head_commit.body }}"
          BRANCH="${{ github.ref_name }}"
          URL="${{ github.event.head_commit.url }}"

          # Determine display author (author of the commit)
          DISPLAY_AUTHOR="$AUTHOR"

          # Determine the first file action (one file only)
          FILE=""
          if [ -n "${{ github.event.head_commit.added[0] }}" ]; then
            FILE="🖊 Created: ${{ github.event.head_commit.added[0] }}"
          elif [ -n "${{ github.event.head_commit.modified[0] }}" ]; then
            FILE="🔧 Updated: ${{ github.event.head_commit.modified[0] }}"
          elif [ -n "${{ github.event.head_commit.removed[0] }}" ]; then
            FILE="❌ Removed: ${{ github.event.head_commit.removed[0] }}"
          fi

          # Build the message
          MSG="$FILE"$'\n'
          MSG+="Author: $DISPLAY_AUTHOR"$'\n'
          MSG+="Commit Message: $MESSAGE"$'\n'
          if [ "$DESCRIPTION" != "null" ] && [ "$DESCRIPTION" != "" ]; then
            MSG+="Extended Description: \"$DESCRIPTION\""$'\n'
          fi
          MSG+="Branch: $BRANCH"$'\n'
          MSG+="🔗 $URL"

          # Send to Discord
          PAYLOAD=$(jq -n --arg content "$MSG" '{content: $content}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK }}
