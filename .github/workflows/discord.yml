name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          MSG=$(jq -Rn \
            --arg actor "$GITHUB_ACTOR" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg sha "$GITHUB_SHA" \
            --arg message "${{ github.event.head_commit.message }}" \
            '{content: "🚀 **New commit pushed!**\n👤 Author: \($actor)\n📝 Message: \($message)\n🌿 Branch: \($branch)\n🔗 https://github.com/\($repo)/commit/\($sha)"}')
          curl -H "Content-Type: application/json" -d "$MSG" ${{ secrets.DISCORD_WEBHOOK }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
