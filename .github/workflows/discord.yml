name: Discord Notifications

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          PAYLOAD=$(jq -n \
            --arg title "${{ github.event.head_commit.message }}" \
            --arg author "${{ github.actor }}" \
            --arg body "${{ github.event.head_commit.body }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg url "${{ github.event.head_commit.url }}" \
            '{
              content: "\($title)\nAuthor: \($author)\n\($body|select(. != null and . != "") | "Extended Description: \"\(. )\"")\nBranch: \($branch)\n🔗 \($url)"
            }'
          )

          curl -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK }}
